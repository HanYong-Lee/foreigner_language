<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Language Guide</title>
  <style>
    :root {
      --bg: #f4f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #6b7280;
      --line: #e5e7eb;
      --accent: #2563eb;
      --shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
      --radius-lg: 24px;
      --radius-md: 16px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans KR", "Malgun Gothic", sans-serif;
      background: linear-gradient(180deg, #f8fbff 0%, #eef4fb 100%);
      color: var(--text);
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(255, 255, 255, 0.92);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(229, 231, 235, 0.9);
    }

    .topbar__inner {
      max-width: 980px;
      margin: 0 auto;
      padding: 12px 16px;
      display: flex;
      justify-content: flex-end;
      align-items: center;
    }

    .lang-select {
      width: 180px;
      max-width: 100%;
      padding: 11px 14px;
      font-size: 15px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #fff;
      color: var(--text);
      outline: none;
    }

    .wrap {
      max-width: 980px;
      margin: 0 auto;
      padding: 28px 16px 40px;
    }

    .hero,
    .viewer {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow);
    }

    .hero {
      padding: 32px 20px;
      text-align: center;
    }

    .hero h1 {
      margin: 0 0 12px;
      font-size: 28px;
      line-height: 1.3;
      letter-spacing: -0.03em;
    }

    .hero p {
      margin: 0;
      color: var(--muted);
      font-size: 16px;
      line-height: 1.6;
    }

    .language-grid {
      margin-top: 24px;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .language-btn {
      border: 1px solid var(--line);
      background: #fff;
      color: var(--text);
      border-radius: var(--radius-md);
      padding: 18px 12px;
      font-size: 17px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease;
    }

    .language-btn:hover,
    .language-btn:active {
      transform: translateY(-1px);
      border-color: #bfdbfe;
      box-shadow: 0 8px 18px rgba(37, 99, 235, 0.12);
    }

    .viewer {
      display: none;
      margin-top: 22px;
      padding: 14px;
    }

    .viewer.active {
      display: block;
    }

    .viewer__head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      padding: 4px 6px 14px;
      flex-wrap: wrap;
    }

    .viewer__title {
      font-size: 18px;
      font-weight: 800;
      letter-spacing: -0.02em;
    }

    .viewer__desc {
      font-size: 14px;
      color: var(--muted);
    }

    .image-frame {
      width: 100%;
      overflow: hidden;
      border-radius: 18px;
      background: #fff;
      border: 1px solid #eef2f7;
    }

    .image-frame img {
      display: block;
      width: 100%;
      height: auto;
      object-fit: contain;
    }

    .empty-note {
      margin-top: 18px;
      text-align: center;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.6;
    }

    @media (max-width: 640px) {
      .wrap {
        padding-top: 20px;
      }

      .hero {
        padding: 26px 16px;
      }

      .hero h1 {
        font-size: 24px;
      }

      .language-grid {
        grid-template-columns: 1fr;
      }

      .language-btn {
        padding: 16px 12px;
        font-size: 16px;
      }

      .topbar__inner {
        justify-content: stretch;
      }

      .lang-select {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="topbar__inner">
      <select id="languageSelect" class="lang-select" aria-label="언어 선택">
        <option value="">Language</option>
        <option value="ko">한국어</option>
        <option value="en">영어</option>
        <option value="ru">러시아어</option>
        <option value="zh">중국어</option>
        <option value="vi">베트남어</option>
        <option value="th">태국어</option>
      </select>
    </div>
  </header>

  <main class="wrap">
    <section id="heroSection" class="hero">
      <h1>Select a language.</h1>
      <p>You can see a translated leaflet.</p>

      <div class="language-grid">
        <button class="language-btn" data-lang="ko">한국어</button>
        <button class="language-btn" data-lang="en">English</button>
        <button class="language-btn" data-lang="ru">Русский</button>
        <button class="language-btn" data-lang="zh">汉语</button>
        <button class="language-btn" data-lang="vi">tiếng Việt</button>
        <button class="language-btn" data-lang="th">泰語</button>
      </div>

      <div class="empty-note">
        You can see a translated leaflet after entering to QR code.
      </div>
    </section>

    <section id="viewer" class="viewer">
      <div class="viewer__head">
        <div>
          <div id="viewerTitle" class="viewer__title"></div>
          <div class="viewer__desc">번역된 안내 이미지를 확인하세요.</div>
        </div>
      </div>
      <div class="image-frame">
        <img id="flyerImage" src="" alt="번역 전단지 이미지" />
      </div>
    </section>
  </main>

  <script>
    const languageMap = {
      ko: {
        label: '한국어',
        image: './images/flyer-ko.jpg'
      },
      en: {
        label: '영어',
        image: './images/flyer-en.jpg'
      },
      ru: {
        label: '러시아어',
        image: './images/flyer-ru.jpg'
      },
      zh: {
        label: '중국어',
        image: './images/flyer-zh.jpg'
      },
      vi: {
        label: '베트남어',
        image: './images/flyer-vi.jpg'
      },
      th: {
        label: '태국어',
        image: './images/flyer-th.jpg'
      }
    };

    const select = document.getElementById('languageSelect');
    const buttons = document.querySelectorAll('.language-btn');
    const viewer = document.getElementById('viewer');
    const flyerImage = document.getElementById('flyerImage');
    const viewerTitle = document.getElementById('viewerTitle');
    const heroSection = document.getElementById('heroSection');

    function setLanguage(lang) {
      const current = languageMap[lang];
      if (!current) return;

      select.value = lang;
      flyerImage.src = current.image;
      flyerImage.alt = current.label + ' 번역 전단지';
      viewerTitle.textContent = current.label;
      viewer.classList.add('active');
      heroSection.style.display = 'none';

      const url = new URL(window.location.href);
      url.searchParams.set('lang', lang);
      window.history.replaceState({}, '', url);
    }

    select.addEventListener('change', (e) => {
      const lang = e.target.value;
      if (!lang) {
        viewer.classList.remove('active');
        heroSection.style.display = 'block';
        const url = new URL(window.location.href);
        url.searchParams.delete('lang');
        window.history.replaceState({}, '', url);
        return;
      }
      setLanguage(lang);
    });

    buttons.forEach((button) => {
      button.addEventListener('click', () => {
        setLanguage(button.dataset.lang);
      });
    });

    const initialLang = new URLSearchParams(window.location.search).get('lang');
    if (initialLang && languageMap[initialLang]) {
      setLanguage(initialLang);
    }
  </script>
</body>
</html>
